<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日撸猫</title>
  <style>
    :root {
      --cream: #fff3dc;
      --cream-deep: #f2d6ad;
      --caramel: #c87835;
      --caramel-dark: #7a421f;
      --night: #263342;
      --mint: #8fd7bd;
      --sun: #ffd56b;
      --rose: #e68479;
      --ink: #2c211c;
      --card: rgba(255, 248, 235, 0.76);
      --shadow: 0 28px 80px rgba(72, 45, 28, 0.18);
      --serif: "Songti SC", "STSong", "Noto Serif CJK SC", "Source Han Serif SC", serif;
      --sans: "Avenir Next", "PingFang SC", "Hiragino Sans GB", sans-serif;
    }

    body.dark {
      --cream: #2d251c;
      --cream-deep: #3d3227;
      --caramel: #d4a05c;
      --caramel-dark: #b88642;
      --night: #e8e0d0;
      --mint: #6db39a;
      --sun: #e5c052;
      --rose: #c46a60;
      --ink: #e8e0d0;
      --card: rgba(61, 50, 39, 0.76);
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: #f8e6c7;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 16%, rgba(255, 213, 107, 0.42), transparent 28%),
        radial-gradient(circle at 84% 12%, rgba(143, 215, 189, 0.38), transparent 26%),
        radial-gradient(circle at 76% 82%, rgba(200, 120, 53, 0.26), transparent 30%),
        linear-gradient(135deg, #fff8ea 0%, #f4d9b0 52%, #d9b383 100%);
    }

    body.dark {
      background:
        radial-gradient(circle at 12% 16%, rgba(229, 192, 82, 0.18), transparent 28%),
        radial-gradient(circle at 84% 12%, rgba(109, 179, 154, 0.14), transparent 26%),
        radial-gradient(circle at 76% 82%, rgba(212, 160, 92, 0.12), transparent 30%),
        linear-gradient(135deg, #1a1510 0%, #2d251c 52%, #3d3227 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.5;
      background-image:
        linear-gradient(rgba(122, 66, 31, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(122, 66, 31, 0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 78%);
    }

    body.dark::before {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    }

    .toggle-switch {
      position: relative;
      width: 48px;
      height: 28px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: background 220ms ease;
    }

    .toggle-switch::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
      transition: left 220ms ease;
    }

    .toggle-switch.on {
      background: var(--mint);
    }

    .toggle-switch.on::after {
      left: 24px;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.36);
    }

    .settings-row + .settings-row {
      margin-top: 10px;
    }

    .settings-row span {
      color: var(--night);
      font-size: 14px;
      font-weight: 800;
    }

    body.dark .settings-row {
      background: rgba(255, 255, 255, 0.08);
    }

    .gallery-panel {
      margin-top: 18px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 34px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .gallery-panel h2 {
      margin: 0 0 20px;
      color: var(--night);
      font-family: var(--serif);
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .panel-note {
      margin: -6px 0 16px;
      color: rgba(44, 33, 28, 0.62);
      font-size: 14px;
      line-height: 1.65;
    }

    body.dark .panel-note,
    body.dark .hint,
    body.dark .intro,
    body.dark .cat-badge span,
    body.dark .date-card span,
    body.dark .stat label {
      color: rgba(232, 224, 208, 0.68);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .gallery-item {
      aspect-ratio: 1;
      border-radius: 20px;
      background:
        radial-gradient(circle at 34% 28%, rgba(255, 255, 255, 0.34), transparent 24%),
        linear-gradient(145deg, var(--mini-start, #fff), var(--mini-mid, #d99356), var(--mini-end, #9e5528));
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease;
      overflow: hidden;
      position: relative;
    }

    body.dark .gallery-item {
      background: rgba(255, 255, 255, 0.08);
    }

    .gallery-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.12);
    }

    .gallery-item.active {
      box-shadow: 0 0 0 3px var(--mint), 0 12px 28px rgba(143, 215, 189, 0.28);
    }

    .gallery-item .mini-cat {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--caramel-dark);
      font-family: var(--serif);
      font-size: 34px;
      font-weight: 900;
    }

    .gallery-item .cat-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.4));
      color: #fff;
      font-size: 12px;
      text-align: center;
    }

    .achievement-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 213, 107, 0.3);
      color: var(--night);
      font-size: 13px;
      font-weight: 700;
    }

    .achievement-badge.locked {
      opacity: 0.5;
      background: rgba(0, 0, 0, 0.1);
    }

    body.dark .achievement-badge.locked {
      background: rgba(255, 255, 255, 0.08);
    }

    .achievement-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--sun), var(--caramel));
      color: var(--night);
      font-size: 13px;
      font-weight: 800;
    }

    .page {
      position: relative;
      width: min(1180px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 44px 0 40px;
    }

    .shell {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 28px;
      align-items: stretch;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 8px 14px;
      border: 1px solid rgba(122, 66, 31, 0.2);
      border-radius: 999px;
      color: var(--caramel-dark);
      font-size: 13px;
      letter-spacing: 0.12em;
      background: rgba(255, 248, 235, 0.56);
      backdrop-filter: blur(14px);
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 0 6px rgba(143, 215, 189, 0.24);
    }

    h1 {
      max-width: 720px;
      margin: 18px 0 12px;
      color: var(--night);
      font-family: var(--serif);
      font-size: clamp(48px, 7vw, 92px);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.07em;
    }

    .intro {
      max-width: 570px;
      margin: 0;
      color: rgba(44, 33, 28, 0.72);
      font-size: 17px;
      line-height: 1.85;
    }

    .date-card {
      min-width: 210px;
      padding: 18px 20px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 28px;
      background: rgba(255, 248, 235, 0.62);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      text-align: right;
    }

    .date-card span {
      display: block;
      color: rgba(44, 33, 28, 0.6);
      font-size: 13px;
      letter-spacing: 0.16em;
    }

    .date-card strong {
      display: block;
      margin-top: 6px;
      color: var(--night);
      font-family: var(--serif);
      font-size: 30px;
    }

    .stage-card,
    .panel {
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 40px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(22px);
    }

    .stage-card {
      position: relative;
      min-height: 640px;
      padding: 28px;
      overflow: hidden;
    }

    .stage-card::before {
      content: "";
      position: absolute;
      width: 620px;
      height: 620px;
      left: 50%;
      top: 54%;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle, rgba(255, 213, 107, 0.58) 0 11%, transparent 12%),
        conic-gradient(from 90deg, rgba(143, 215, 189, 0.14), rgba(200, 120, 53, 0.18), rgba(255, 213, 107, 0.12), rgba(143, 215, 189, 0.14));
      filter: blur(2px);
      opacity: 0.8;
    }

    .cat-badge {
      position: relative;
      z-index: 2;
      display: inline-flex;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      border-radius: 22px;
      color: var(--night);
      background: rgba(255, 255, 255, 0.52);
    }

    .cat-badge strong {
      font-family: var(--serif);
      font-size: 22px;
    }

    .cat-badge span {
      color: rgba(44, 33, 28, 0.58);
      font-size: 13px;
    }

    .cat-area {
      position: absolute;
      left: 50%;
      bottom: 70px;
      z-index: 3;
      width: min(520px, 82vw);
      height: 430px;
      transform: translateX(-50%);
      outline: none;
      cursor: pointer;
      --fur-start: #d99356;
      --fur-mid: #c87835;
      --fur-end: #9e5528;
      --ear-color: #bd6a34;
      --inner-ear: #e8a17b;
      --paw-color: #b76431;
      --tail-color: #b76431;
      --eye-color: var(--night);
      --nose-color: #70412e;
    }

    .cat-area:focus-visible .cat {
      box-shadow: 0 0 0 8px rgba(143, 215, 189, 0.36), 0 30px 70px rgba(122, 66, 31, 0.22);
    }

    .cat-shadow {
      position: absolute;
      left: 50%;
      bottom: 12px;
      width: 360px;
      height: 74px;
      border-radius: 50%;
      transform: translateX(-50%);
      background: rgba(122, 66, 31, 0.18);
      filter: blur(12px);
    }

    .cushion {
      position: absolute;
      left: 50%;
      bottom: 22px;
      width: 410px;
      height: 112px;
      border-radius: 50%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 38% 32%, rgba(255, 255, 255, 0.42), transparent 20%),
        linear-gradient(135deg, #91d9bf, #5fae92);
      box-shadow: inset 0 -18px 34px rgba(38, 51, 66, 0.12), 0 24px 42px rgba(72, 45, 28, 0.12);
    }

    .cat {
      position: absolute;
      left: 50%;
      bottom: 86px;
      width: 268px;
      height: 244px;
      border-radius: 45% 45% 42% 42%;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 36% 30%, rgba(255, 255, 255, 0.38), transparent 18%),
        linear-gradient(155deg, var(--fur-start) 0%, var(--fur-mid) 54%, var(--fur-end) 100%);
      box-shadow: 0 30px 70px rgba(122, 66, 31, 0.22), inset -18px -16px 30px rgba(122, 66, 31, 0.18);
      transition: transform 220ms ease;
      animation: breathe 3.2s ease-in-out infinite;
    }

    .cat::before,
    .cat::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .cat::before {
      inset: 16px 18px 34px;
      border-radius: 45% 45% 42% 42%;
      opacity: 0.72;
      mix-blend-mode: multiply;
    }

    .cat::after {
      left: 50%;
      bottom: 18px;
      width: 112px;
      height: 84px;
      border-radius: 52% 52% 44% 44%;
      transform: translateX(-50%);
      background: rgba(255, 246, 222, 0.24);
    }

    .cat-area.pattern-striped .cat::before {
      background:
        repeating-linear-gradient(105deg, rgba(91, 48, 24, 0.34) 0 10px, transparent 10px 28px);
    }

    .cat-area.pattern-calico .cat::before {
      background:
        radial-gradient(circle at 25% 28%, rgba(38, 30, 25, 0.82) 0 16%, transparent 17%),
        radial-gradient(circle at 68% 20%, rgba(207, 118, 45, 0.76) 0 18%, transparent 19%),
        radial-gradient(circle at 74% 66%, rgba(38, 30, 25, 0.68) 0 14%, transparent 15%);
    }

    .cat-area.pattern-void .cat::before {
      background:
        radial-gradient(circle at 46% 24%, rgba(255, 255, 255, 0.08) 0 12%, transparent 13%),
        radial-gradient(circle at 72% 62%, rgba(255, 255, 255, 0.06) 0 14%, transparent 15%);
      mix-blend-mode: screen;
    }

    .cat-area.pattern-snow .cat::before {
      background:
        radial-gradient(circle at 30% 24%, rgba(216, 196, 168, 0.45) 0 9%, transparent 10%),
        radial-gradient(circle at 68% 18%, rgba(216, 196, 168, 0.32) 0 8%, transparent 9%);
    }

    .cat-area.pattern-tuxedo .cat::before {
      background:
        radial-gradient(ellipse at 50% 76%, rgba(255, 248, 230, 0.88) 0 28%, transparent 29%),
        radial-gradient(circle at 50% 20%, rgba(255, 248, 230, 0.68) 0 10%, transparent 11%);
      mix-blend-mode: normal;
    }

    .cat-area:hover .cat {
      transform: translateX(-50%) translateY(-8px) rotate(-1deg);
    }

    .cat-area.petted .cat {
      animation: happy 520ms ease;
    }

    .ear {
      position: absolute;
      top: -50px;
      width: 88px;
      height: 92px;
      background: var(--ear-color);
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
      transition: clip-path 220ms ease, border-radius 220ms ease;
    }

    .ear::after {
      content: "";
      position: absolute;
      left: 24px;
      top: 30px;
      width: 40px;
      height: 48px;
      background: var(--inner-ear);
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .cat-area.ear-round .ear {
      top: -36px;
      width: 78px;
      height: 76px;
      border-radius: 70% 70% 32% 32%;
      clip-path: none;
    }

    .cat-area.ear-round .ear::after {
      top: 22px;
      border-radius: 70% 70% 32% 32%;
      clip-path: none;
    }

    .ear.left {
      left: 28px;
      transform: rotate(-16deg);
    }

    .ear.right {
      right: 28px;
      transform: rotate(16deg);
    }

    .face {
      position: absolute;
      inset: 0;
    }

    .eye {
      position: absolute;
      top: 88px;
      width: 24px;
      height: 36px;
      border-radius: 50%;
      background: var(--eye-color);
      box-shadow: inset 4px 7px 0 rgba(255, 255, 255, 0.34);
      animation: blink 5.2s infinite;
    }

    .eye.left {
      left: 78px;
    }

    .eye.right {
      right: 78px;
    }

    .nose {
      position: absolute;
      left: 50%;
      top: 124px;
      width: 28px;
      height: 22px;
      border-radius: 48% 48% 58% 58%;
      transform: translateX(-50%);
      background: var(--nose-color);
    }

    .mouth {
      position: absolute;
      left: 50%;
      top: 148px;
      width: 62px;
      height: 34px;
      border-bottom: 4px solid rgba(38, 51, 66, 0.72);
      border-radius: 0 0 60px 60px;
      transform: translateX(-50%);
    }

    .whisker {
      position: absolute;
      top: 138px;
      width: 72px;
      height: 2px;
      border-radius: 999px;
      background: rgba(44, 33, 28, 0.52);
    }

    .whisker.left.one { left: 10px; transform: rotate(10deg); }
    .whisker.left.two { left: 8px; top: 158px; transform: rotate(-5deg); }
    .whisker.right.one { right: 10px; transform: rotate(-10deg); }
    .whisker.right.two { right: 8px; top: 158px; transform: rotate(5deg); }

    .paw {
      position: absolute;
      bottom: -15px;
      width: 72px;
      height: 54px;
      border-radius: 50%;
      background: var(--paw-color);
      box-shadow: inset 0 -10px 16px rgba(122, 66, 31, 0.18);
    }

    .paw.left {
      left: 54px;
    }

    .paw.right {
      right: 54px;
    }

    .tail {
      position: absolute;
      right: 52px;
      bottom: 128px;
      width: 170px;
      height: 50px;
      border: 24px solid var(--tail-color);
      border-left: 0;
      border-bottom: 0;
      border-radius: 0 90px 0 0;
      transform-origin: 0 100%;
      animation: tail 2.4s ease-in-out infinite;
    }

    .cat-area.tail-fluffy .tail {
      right: 38px;
      bottom: 118px;
      width: 188px;
      height: 68px;
      border-width: 30px;
      border-radius: 0 110px 0 0;
    }

    .cat-area.tail-hook .tail {
      right: 42px;
      bottom: 142px;
      width: 132px;
      height: 96px;
      border-width: 22px;
      border-radius: 0 90px 80px 0;
      transform-origin: 10% 100%;
    }

    .cat-area.tail-short .tail {
      right: 84px;
      bottom: 132px;
      width: 92px;
      height: 44px;
      border-width: 22px;
    }

    .reaction {
      position: absolute;
      left: 50%;
      bottom: 514px;
      z-index: 4;
      min-width: 240px;
      padding: 14px 18px;
      border: 1px solid rgba(255, 255, 255, 0.64);
      border-radius: 24px 24px 24px 8px;
      color: var(--night);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 18px 40px rgba(72, 45, 28, 0.12);
      transform: translateX(-50%);
      text-align: center;
      font-weight: 700;
    }

    .hand {
      position: absolute;
      left: calc(50% + 108px);
      top: 190px;
      z-index: 5;
      width: 78px;
      height: 64px;
      border-radius: 36px 36px 42px 42px;
      background: #f0ba88;
      box-shadow: inset -8px -8px 0 rgba(122, 66, 31, 0.08), 0 18px 28px rgba(122, 66, 31, 0.1);
      opacity: 0;
      transform: rotate(-24deg) translateY(-18px);
      pointer-events: none;
    }

    .hand::before,
    .hand::after {
      content: "";
      position: absolute;
      top: -14px;
      width: 20px;
      height: 42px;
      border-radius: 999px;
      background: #f0ba88;
    }

    .hand::before {
      left: 14px;
    }

    .hand::after {
      right: 14px;
    }

    .cat-area.petted .hand {
      animation: pat 520ms ease;
    }

    .heart {
      position: absolute;
      z-index: 8;
      width: 16px;
      height: 16px;
      background: var(--rose);
      transform: rotate(45deg);
      animation: float-heart 900ms ease-out forwards;
      pointer-events: none;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--rose);
    }

    .heart::before {
      left: -8px;
    }

    .heart::after {
      top: -8px;
    }

    .panel {
      padding: 24px;
    }

    .panel h2,
    .task h2 {
      margin: 0 0 16px;
      color: var(--night);
      font-family: var(--serif);
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .stat-list {
      display: grid;
      gap: 14px;
    }

    .stat {
      padding: 18px;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.48);
    }

    .stat label {
      display: block;
      margin-bottom: 8px;
      color: rgba(44, 33, 28, 0.56);
      font-size: 13px;
      letter-spacing: 0.12em;
    }

    .stat strong {
      color: var(--night);
      font-family: var(--serif);
      font-size: 34px;
      line-height: 1;
    }

    .meter {
      height: 12px;
      margin-top: 14px;
      border-radius: 999px;
      background: rgba(38, 51, 66, 0.12);
      overflow: hidden;
    }

    .meter span {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--mint), var(--sun), var(--caramel));
      transition: width 360ms ease;
    }

    .task {
      margin-top: 18px;
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: 34px;
      background: rgba(38, 51, 66, 0.92);
      color: #fff8eb;
      box-shadow: 0 26px 70px rgba(38, 51, 66, 0.22);
    }

    .task h2 {
      color: #fff8eb;
    }

    .task p {
      margin: 0;
      color: rgba(255, 248, 235, 0.72);
      line-height: 1.8;
    }

    .task-status {
      display: inline-flex;
      margin-top: 18px;
      padding: 9px 13px;
      border-radius: 999px;
      color: var(--night);
      background: var(--sun);
      font-size: 14px;

    }

    }

      font: inherit;
    }

    button.gallery-item:hover {
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.12);
    }

      position: relative;
      z-index: 2;
      max-width: 340px;
      margin-top: 18px;
      color: rgba(44, 33, 28, 0.62);
      font-size: 14px;
      line-height: 1.7;
    }

    .spark {
      position: absolute;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 0 28px rgba(255, 213, 107, 0.52);
      animation: drift 7s ease-in-out infinite;
    }

    .spark.one {
      width: 64px;
      height: 64px;
      right: 12%;
      top: 16%;
    }

    .spark.two {
      width: 34px;
      height: 34px;
      left: 10%;
      bottom: 24%;
      animation-delay: -2s;
    }

    .spark.three {
      width: 48px;
      height: 48px;
      right: 22%;
      bottom: 14%;
      animation-delay: -4s;
    }

    @keyframes breathe {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
      50% { transform: translateX(-50%) translateY(-5px) scale(1.015); }
    }

    @keyframes happy {
      0% { transform: translateX(-50%) rotate(0); }
      35% { transform: translateX(-50%) translateY(-14px) rotate(-3deg); }
      70% { transform: translateX(-50%) translateY(-6px) rotate(3deg); }
      100% { transform: translateX(-50%) rotate(0); }
    }

    @keyframes blink {
      0%, 88%, 100% { transform: scaleY(1); }
      92%, 96% { transform: scaleY(0.08); }
    }

    @keyframes tail {
      0%, 100% { transform: rotate(8deg); }
      50% { transform: rotate(-12deg); }
    }

    @keyframes pat {
      0% { opacity: 0; transform: rotate(-24deg) translateY(-28px); }
      30% { opacity: 1; transform: rotate(-18deg) translateY(16px); }
      70% { opacity: 1; transform: rotate(-26deg) translateY(4px); }
      100% { opacity: 0; transform: rotate(-24deg) translateY(-20px); }
    }

    @keyframes float-heart {
      0% { opacity: 0; transform: translateY(10px) rotate(45deg) scale(0.5); }
      15% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-92px) rotate(45deg) scale(1.25); }
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(12px, -18px, 0); }
    }

    @media (max-width: 920px) {
      .page {
        padding-top: 28px;
      }

      header,
      .shell {

        look: {

    const reactions = [
      "喵。这个力度刚刚好。",
      "它眯起眼睛，尾巴轻轻晃了一下。",
      "呼噜声变大了，像一台小小暖炉。",

      "小爪子踩了两下垫子，表示满意。"
    ];

    const achievements = [
      { id: "first", label: "初次见面", need: 1 },
      { id: "warm", label: "掌心变暖", need: 5 },
      { id: "purr", label: "呼噜专家", need: 15 },
      { id: "friend", label: "可信人类", need: 30 },
      { id: "keeper", label: "猫咪管家", need: 60 }
    ];

    const touchReactions = {
      head: ["摸摸头成功，它把耳朵放松了。", "它把额头轻轻顶过来，像在盖章。"],
      back: ["顺着背摸下去，尾巴愉快地晃了两下。", "它伸了个懒腰，决定再趴一会儿。"],
      chin: ["下巴被挠到位了，呼噜声开始升级。", "它抬起下巴，露出非常满意的表情。"]
    };

    const storageKey = "daily-cat-state-v1";
    const profileKey = "daily-cat-profile-v2";
    const today = new Date();
    const dateKey = today.toISOString().slice(0, 10);
    const dayIndex = Math.floor(today.getTime() / 86400000) % cats.length;
    let activeCatIndex = dayIndex;
    let cat = cats[activeCatIndex];

    const profile = loadProfile();
    updateStreak();
    const state = loadState();
    const elements = {
      todayText: document.getElementById("todayText"),
      catName: document.getElementById("catName"),
      catLine: document.getElementById("catLine"),
      catArea: document.getElementById("catArea"),
      reaction: document.getElementById("reaction"),
      petCount: document.getElementById("petCount"),
      affectionText: document.getElementById("affectionText"),
      affectionMeter: document.getElementById("affectionMeter"),
      healScore: document.getElementById("healScore"),
      taskText: document.getElementById("taskText"),
      taskStatus: document.getElementById("taskStatus"),
      petButton: document.getElementById("petButton"),
      resetButton: document.getElementById("resetButton"),
      streakDays: document.getElementById("streakDays"),
      themeToggle: document.getElementById("themeToggle"),
      soundToggle: document.getElementById("soundToggle"),
      achievementRow: document.getElementById("achievementRow"),
      galleryGrid: document.getElementById("galleryGrid"),
      catDetail: document.getElementById("catDetail")
    };

    function loadProfile() {
      try {
        const saved = JSON.parse(localStorage.getItem(profileKey));
        return {
          totalPets: Number(saved?.totalPets) || 0,
          streakDays: Number(saved?.streakDays) || 0,
          lastVisit: saved?.lastVisit || "",
          darkMode: Boolean(saved?.darkMode),
          soundOn: saved?.soundOn !== false,
          visitedCats: Array.isArray(saved?.visitedCats) ? saved.visitedCats : []
        };
      } catch (error) {
        console.warn("读取猫咪档案失败，已使用默认档案。", error);
        return { totalPets: 0, streakDays: 0, lastVisit: "", darkMode: false, soundOn: true, visitedCats: [] };
      }
    }

    function saveProfile() {
      localStorage.setItem(profileKey, JSON.stringify(profile));
    }

    function updateStreak() {
      if (profile.lastVisit === dateKey) {
        return;
      }

      const yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);
      const yesterdayKey = yesterday.toISOString().slice(0, 10);
      profile.streakDays = profile.lastVisit === yesterdayKey ? profile.streakDays + 1 : 1;
      profile.lastVisit = dateKey;
      saveProfile();
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        if (saved && saved.date === dateKey) {
          return {
            date: dateKey,
            petCount: Number(saved.petCount) || 0,
            affection: Number(saved.affection) || 0,
            taskDone: Boolean(saved.taskDone)
          };
        }
      } catch (error) {
        console.warn("读取每日撸猫状态失败，已使用默认状态。", error);
      }

      return { date: dateKey, petCount: 0, affection: 0, taskDone: false };
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function formatDate() {
      return new Intl.DateTimeFormat("zh-CN", {
        month: "long",
        day: "numeric",
        weekday: "long"
      }).format(today);
    }

    function calculateHealScore() {
      return Math.min(99, 18 + state.petCount * 9 + Math.round(state.affection * 0.42));
    }

    function isTaskDone() {
      return state.petCount >= 3 || state.affection >= 60 || calculateHealScore() >= 70;
    }

    function updateView() {
      state.taskDone = isTaskDone();
      elements.petCount.textContent = state.petCount;
      elements.affectionText.textContent = state.affection;
      elements.affectionMeter.style.width = `${state.affection}%`;
      elements.healScore.textContent = calculateHealScore();
      elements.streakDays.textContent = profile.streakDays;
      elements.taskStatus.textContent = state.taskDone ? "已完成" : "进行中";
      elements.taskStatus.style.background = state.taskDone ? "var(--mint)" : "var(--sun)";
      elements.taskStatus.style.color = "var(--night)";
      renderAchievements();
      renderGallery();
      saveState();
      saveProfile();
    }

    function petCat(sourceElement, touchType = "head") {
      state.petCount += 1;
      state.affection = Math.min(100, state.affection + 12 + (state.petCount % 3));
      profile.totalPets += 1;
      profile.visitedCats[activeCatIndex] = true;
      const pool = touchReactions[touchType] || reactions;
      elements.reaction.textContent = pool[state.petCount % pool.length];

      elements.catArea.classList.remove("petted");
      void elements.catArea.offsetWidth;
      elements.catArea.classList.add("petted");

      createHeart(sourceElement || elements.catArea);
      playPurr();
      updateView();
    }

    function createHeart(sourceElement) {
      const rect = sourceElement.getBoundingClientRect();
      const heart = document.createElement("span");
      heart.className = "heart";
      heart.style.left = `${rect.left + rect.width / 2 + (Math.random() * 70 - 35)}px`;
      heart.style.top = `${rect.top + rect.height * 0.35 + (Math.random() * 40 - 20)}px`;
      document.body.appendChild(heart);
      window.setTimeout(() => heart.remove(), 950);
    }

    function playPurr() {
      if (!profile.soundOn) {
        return;
      }

      if (!window.AudioContext && !window.webkitAudioContext) {
        return;
      }

      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      const audio = new AudioContextClass();
      const oscillator = audio.createOscillator();
      const gain = audio.createGain();
      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(92, audio.currentTime);
      oscillator.frequency.exponentialRampToValueAtTime(132, audio.currentTime + 0.16);
      gain.gain.setValueAtTime(0.0001, audio.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.045, audio.currentTime + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.22);
      oscillator.connect(gain);
      gain.connect(audio.destination);
      oscillator.start();
      oscillator.stop(audio.currentTime + 0.24);
      window.setTimeout(() => audio.close(), 320);
    }

    function resetToday() {
      state.petCount = 0;
      state.affection = 0;
      state.taskDone = false;
      elements.reaction.textContent = "猫咪重新趴好了，等你再摸一下。";

    function getTouchType(event) {
      if (!event || !event.currentTarget) {
        return "head";
      }

      const rect = event.currentTarget.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      if (y < rect.height * 0.42) {
        return "head";
      }
      if (x > rect.width * 0.58) {
        return "back";
      }
      return "chin";
    }

    function applyCatLook(selectedCat) {
      const look = selectedCat.look || {};
      const classNames = ["pattern-striped", "pattern-calico", "pattern-void", "pattern-snow", "pattern-tuxedo", "tail-fluffy", "tail-hook", "tail-short", "ear-round"];
      elements.catArea.classList.remove(...classNames);
      [look.pattern, look.tail, look.ear].filter(Boolean).forEach((className) => {
        elements.catArea.classList.add(className);
      });

      Object.entries(look.colors || {}).forEach(([property, value]) => {
        elements.catArea.style.setProperty(property, value);
      });
    }

    function setActiveCat(index) {
      activeCatIndex = index;
      cat = cats[activeCatIndex];
      applyCatLook(cat);
      elements.catName.textContent = cat.name;
      elements.catLine.textContent = cat.line;
      elements.taskText.textContent = cat.task;
      elements.catDetail.textContent = `${cat.name}：${cat.detail}`;
      elements.reaction.textContent = activeCatIndex === dayIndex ? "这是今天值班的猫咪。" : "你从图鉴里请来了一只猫咪。";
      renderGallery();
    }

    function renderGallery() {
      elements.galleryGrid.innerHTML = cats.map((item, index) => {
        const active = index === activeCatIndex ? " active" : "";
        const visited = profile.visitedCats[index] ? "已撸" : "未撸";
        const colors = item.look.colors;
        const style = `--mini-start:${colors["--fur-start"]}; --mini-mid:${colors["--fur-mid"]}; --mini-end:${colors["--fur-end"]};`;
        return `
          <button class="gallery-item${active}" type="button" data-cat-index="${index}" aria-label="查看${item.name}" style="${style}">
            <span class="mini-cat">${item.mark}</span>
            <span class="cat-name">${item.name} · ${visited}</span>
          </button>
        `;
      }).join("");
    }

    function renderAchievements() {
      elements.achievementRow.innerHTML = achievements.map((item) => {
        const unlocked = profile.totalPets >= item.need;
        return `<span class="achievement-badge${unlocked ? "" : " locked"}">${unlocked ? "已解锁" : "未解锁"} · ${item.label}</span>`;
      }).join("");
    }

    function applyPreferences() {
      document.body.classList.toggle("dark", profile.darkMode);
      elements.themeToggle.classList.toggle("on", profile.darkMode);
      elements.soundToggle.classList.toggle("on", profile.soundOn);
      elements.themeToggle.setAttribute("aria-pressed", String(profile.darkMode));
      elements.soundToggle.setAttribute("aria-pressed", String(profile.soundOn));
    }

    elements.todayText.textContent = formatDate();
    setActiveCat(dayIndex);
    applyPreferences();

    elements.catArea.addEventListener("click", (event) => petCat(elements.catArea, getTouchType(event)));
    elements.petButton.addEventListener("click", () => petCat(elements.petButton, "head"));
    elements.resetButton.addEventListener("click", resetToday);
    elements.themeToggle.addEventListener("click", () => {
      profile.darkMode = !profile.darkMode;
      applyPreferences();
      saveProfile();
    });
    elements.soundToggle.addEventListener("click", () => {
      profile.soundOn = !profile.soundOn;
      applyPreferences();
      saveProfile();
    });
    elements.galleryGrid.addEventListener("click", (event) => {
      const button = event.target.closest("[data-cat-index]");
      if (!button) {
        return;
      }
      setActiveCat(Number(button.dataset.catIndex));
    });
    elements.catArea.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        petCat(elements.catArea, "head");
      }
    });

    updateView();
  </script>
</body>
</html>
